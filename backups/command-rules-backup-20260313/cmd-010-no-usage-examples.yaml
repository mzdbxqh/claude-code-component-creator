id: CMD-010
name: no-usage-examples
severity: warning
component_type: command
category: structure

title:
  zh: "缺少详细使用示例"
  en: "Missing detailed usage examples"

description:
  zh: |
    Command 文档应该包含多个详细的使用示例，
    覆盖常见使用场景和边界情况。
  en: |
    Command documentation should include multiple detailed usage examples
    covering common scenarios and edge cases.

rationale:
  zh: "多个示例帮助用户理解不同场景下的使用方法。"
  en: "Multiple examples help users understand usage in different scenarios."

handbook_reference: "Chapter 5.4"

detection:
  method: custom
  custom_function: "check_example_count"
  file_pattern: "commands/*.md"
  threshold: 2

fix:
  automatic: false
  suggestion:
    zh: "添加至少 2-3 个使用示例，覆盖基础和进阶场景。"
    en: "Add at least 2-3 usage examples covering basic and advanced scenarios."

examples:
  bad:
    zh: |
      ## 示例
      ```
      /deploy app
      ```
    en: |
      ## Examples
      ```
      /deploy app
      ```
  good:
    zh: |
      ## 示例

      ### 基础部署
      ```
      /deploy my-app
      ```

      ### 指定环境
      ```
      /deploy my-app --env staging
      ```

      ### 带版本号
      ```
      /deploy my-app --version 1.2.3
      ```
    en: |
      ## Examples

      ### Basic Deployment
      ```
      /deploy my-app
      ```

      ### Specify Environment
      ```
      /deploy my-app --env staging
      ```

      ### With Version
      ```
      /deploy my-app --version 1.2.3
      ```

tags: ["structure", "examples", "documentation", "command"]
related_rules: ["CMD-003"]
