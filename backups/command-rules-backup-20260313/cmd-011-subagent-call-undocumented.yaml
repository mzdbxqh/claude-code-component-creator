id: CMD-011
name: subagent-call-undocumented
severity: warning
component_type: command
category: workflow

title:
  zh: "Subagent 调用未记录"
  en: "Undocumented subagent calls"

description:
  zh: |
    Command 如果调用 Subagent，应该在文档中说明调用了哪些 Subagent
    以及它们的作用。
  en: |
    Commands calling subagents should document which subagents are called
    and their purposes.

rationale:
  zh: "透明的依赖关系帮助用户理解命令的内部实现。"
  en: "Transparent dependencies help users understand command internals."

handbook_reference: "Chapter 5.4"

detection:
  method: custom
  custom_function: "check_undocumented_subagents"
  file_pattern: "commands/*.md"

fix:
  automatic: false
  suggestion:
    zh: "添加被调用的 Subagent 列表和说明。"
    en: "Add list and description of called subagents."

examples:
  bad:
    zh: |
      ## 实现
      调用相关组件处理任务。
    en: |
      ## Implementation
      Calls related components to process tasks.
  good:
    zh: |
      ## 实现

      调用以下 Subagent：
      - `deploy-core`: 执行部署逻辑
      - `status-checker`: 验证部署状态
      - `notifier`: 发送部署通知
    en: |
      ## Implementation

      Calls the following subagents:
      - `deploy-core`: Execute deployment logic
      - `status-checker`: Verify deployment status
      - `notifier`: Send deployment notification

tags: ["workflow", "subagent", "dependencies", "command"]
related_rules: []
