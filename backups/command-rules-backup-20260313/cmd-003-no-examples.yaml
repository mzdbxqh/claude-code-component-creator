id: CMD-003
name: no-examples
severity: warning
component_type: command
category: structure

title:
  zh: "缺少使用示例"
  en: "Missing usage examples"

description:
  zh: |
    Command 文档应包含使用示例，帮助用户理解如何调用。
    至少应包含一个基础示例。
  en: |
    Command documentation should include usage examples to help users understand invocation.
    At least one basic example should be provided.

rationale:
  zh: "示例是文档的重要组成部分，能显著降低用户的学习成本。"
  en: "Examples are essential documentation components that significantly reduce learning cost."

handbook_reference: "Chapter 5.4"

detection:
  method: regex
  pattern: "^(?!.*##\\s*(示例|Examples|用法|Usage)).*$"
  file_pattern: "commands/*.md"

fix:
  automatic: false
  suggestion:
    zh: "添加示例章节，包含至少一个调用示例。"
    en: "Add examples section with at least one invocation example."

examples:
  bad:
    zh: |
      # deploy
      部署命令。

      ## 描述
      用于部署应用。
    en: |
      # deploy
      Deploy command.

      ## Description
      Used to deploy applications.
  good:
    zh: |
      # deploy
      部署命令。

      ## 示例

      ```
      /deploy my-app --env production
      ```
    en: |
      # deploy
      Deploy command.

      ## Examples

      ```
      /deploy my-app --env production
      ```

tags: ["structure", "examples", "documentation", "command"]
related_rules: ["CMD-010"]
