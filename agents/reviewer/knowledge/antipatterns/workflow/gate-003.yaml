id: GATE-003
name: plan-quality-gate
severity: warning
component_type: workflow
category: gate

title:
  zh: "Plan 阶段质量卡点验证失败"
  en: "Plan phase quality gate validation failed"

description: |
  验证 Plan 阶段完成后的输出质量。

  **检查项**:
  - Task 数量是否合理
  - Task 目标是否明确
  - 技能引用是否正确

  **通过标准**:
  - Task 粒度适中 (每个 Task 2-4 小时)
  - 每个 Task 有明确的完成标准
  - Task 正确引用所需技能

  **失败恢复**:
  - Task 过大：拆分为更小的子任务
  - 目标不明确：补充 Task 描述和验收标准
  - 技能引用错误：修正技能引用路径

check_logic:
  type: workflow_analysis
  phase: plan
  conditions:
    - task_count_reasonable: true
    - task_objectives_clear: true
    - skill_references_correct: true

suggestion:
  zh: "确保 Plan 输出中 Task 数量合理、目标明确、技能引用正确"
  en: "Ensure Plan output has reasonable task count, clear objectives, and correct skill references"

references:
  - "docs/analysis/2026-03-08-ccc-plugin-design-gap-analysis.md"
