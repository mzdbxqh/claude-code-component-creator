id: GATE-004
name: execute-quality-gate
severity: warning
component_type: workflow
category: gate

title:
  zh: "Execute 阶段质量卡点验证失败"
  en: "Execute phase quality gate validation failed"

description: |
  验证 Execute 阶段完成后的输出质量。

  **检查项**:
  - TDD 流程是否遵循
  - 测试是否通过
  - 静态扫描是否通过

  **通过标准**:
  - 遵循 Red-Green-Refactor 流程
  - 所有单元测试通过
  - 代码静态扫描无 Error

  **失败恢复**:
  - 未遵循 TDD：补充测试用例
  - 测试失败：修复代码直到测试通过
  - 静态扫描失败：修复代码质量问题

check_logic:
  type: workflow_analysis
  phase: execute
  conditions:
    - tdd_process_followed: true
    - tests_passed: true
    - static_analysis_passed: true

suggestion:
  zh: "确保 Execute 输出遵循 TDD 流程、测试通过、静态扫描无问题"
  en: "Ensure Execute output follows TDD process, tests pass, and static analysis has no issues"

references:
  - "docs/analysis/2026-03-08-ccc-plugin-design-gap-analysis.md"
