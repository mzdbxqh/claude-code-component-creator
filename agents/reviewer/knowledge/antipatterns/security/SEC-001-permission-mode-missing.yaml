fix:
  automatic: false
  suggestion:
    zh: |
      **添加 permissionMode 声明**:

      1. **评估操作类型**：
         - 修改操作 → prompt
         - 只读操作 → auto
         - 敏感操作 → prompt
         - 不确定 → prompt （默认安全）

      2. **添加到 frontmatter**：
         ```yaml
         ---
         name: my-skill
         description: "..."
         permissionMode: prompt  # 或 auto
         allowed-tools:
           - Read
           - Write
         ---
         ```

      3. **文档说明**：
         ```markdown
         ## Permission Mode

         This skill uses `prompt` mode because:
         - Modifies files
         - Requires user review

         You'll be asked to confirm each operation.
         ```

      **决策表**:

      | 操作类型 | permissionMode | 示例 |
      |---------|----------------|------|
      | 只读分析 | auto | Read, Grep |
      | 文件修改 | prompt | Write |
      | Git 操作 | prompt | Bash (git) |
      | 网络请求 | prompt | WebFetch |
      | 数据库 | prompt | 数据库工具 |

      **默认规则**: 不确定时使用 prompt
    en: |
      **Add permissionMode declaration**:

      1. **Evaluate operation type**:
         - Modifying operations → prompt
         - Read-only operations → auto
         - Sensitive operations → prompt
         - Uncertain → prompt (default safe)

      2. **Add to frontmatter**:
         ```yaml
         ---
         name: my-skill
         description: "..."
         permissionMode: prompt  # or auto
         allowed-tools:
           - Read
           - Write
         ---
         ```

      3. **Document**:
         ```markdown
         ## Permission Mode

         This skill uses `prompt` mode because:
         - Modifies files
         - Requires user review

         You'll be asked to confirm each operation.
         ```

      **Decision Table**:

      | Operation Type | permissionMode | Examples |
      |---------------|----------------|----------|
      | Read-only | auto | Read, Grep |
      | File modify | prompt | Write |
      | Git ops | prompt | Bash (git) |
      | Network | prompt | WebFetch |
      | Database | prompt | DB tools |

      **Default Rule**: Use prompt when unsure

