fix:
  automatic: false
  suggestion:
    zh: |
      **修复 MCP Server 配置**:

      1. **移动配置到正确位置**：
         - 从 settings.json 移到 .mcp.json
         - 从 hooks.json 移到 .mcp.json

      2. **修复配置格式**：
         ```json
         // .mcp.json
         {
           "mcpServers": {
             "server-name": {
               "command": "node",
               "args": ["path/to/server.js"],
               "env": {
                 "KEY": "${ENV_VAR}"
               }
             }
           }
         }
         ```

      3. **安全修复**：
         - 硬编码 token → 环境变量
         - 添加到 .gitignore
         - 提供 .env.example

      4. **文档完善**：
         ```markdown
         ## MCP Server Configuration

         1. Create .mcp.json
         2. Set environment variables
         3. Verify server starts

         Required env vars:
         - API_KEY: Get from...
         ```

      **检查清单**:
      - [ ] .mcp.json 文件存在
      - [ ] 配置格式正确
      - [ ] 使用环境变量（不硬编码）
      - [ ] README 说明配置步骤
      - [ ] 提供验证方法
    en: |
      **Fix MCP Server Configuration**:

      1. **Move config to correct location**:
         - From settings.json to .mcp.json
         - From hooks.json to .mcp.json

      2. **Fix config format**:
         ```json
         // .mcp.json
         {
           "mcpServers": {
             "server-name": {
               "command": "node",
               "args": ["path/to/server.js"],
               "env": {
                 "KEY": "${ENV_VAR}"
               }
             }
           }
         }
         ```

      3. **Security fixes**:
         - Hardcoded token → environment variable
         - Add to .gitignore
         - Provide .env.example

      4. **Documentation improvements**:
         ```markdown
         ## MCP Server Configuration

         1. Create .mcp.json
         2. Set environment variables
         3. Verify server starts

         Required env vars:
         - API_KEY: Get from...
         ```

      **Checklist**:
      - [ ] .mcp.json file exists
      - [ ] Config format correct
      - [ ] Uses env vars (no hardcoding)
      - [ ] README explains config steps
      - [ ] Provides verification method

