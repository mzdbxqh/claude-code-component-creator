fix:
  automatic: false
  suggestion:
    zh: |
      **修复 LSP Server 配置**:

      1. **移动配置到正确位置**：
         - 从 settings.json 移到 .lsp.json
         - 从 hooks.json 移到 .lsp.json

      2. **修复配置格式**：
         ```json
         // .lsp.json
         {
           "lspServers": {
             "server-name": {
               "command": "lsp-server",
               "args": ["--stdio"],
               "fileWatcher": {
                 "patterns": ["**/*.ext"]
               }
             }
           }
         }
         ```

      3. **安装 LSP server**：
         ```bash
         # TypeScript
         npm install -g typescript-language-server

         # Python
         pip install python-lsp-server

         # Rust
         rustup component add rust-analyzer
         ```

      4. **文档完善**：
         ```markdown
         ## LSP Server Setup

         1. Install LSP server: ...
         2. Create .lsp.json
         3. Verify with test file

         Features:
         - Code completion
         - Error checking
         - Navigation
         ```

      **检查清单**:
      - [ ] .lsp.json 文件存在
      - [ ] LSP server 已安装
      - [ ] 文件监控模式正确
      - [ ] README 说明安装步骤
      - [ ] 提供验证方法
    en: |
      **Fix LSP Server Configuration**:

      1. **Move config to correct location**:
         - From settings.json to .lsp.json
         - From hooks.json to .lsp.json

      2. **Fix config format**:
         ```json
         // .lsp.json
         {
           "lspServers": {
             "server-name": {
               "command": "lsp-server",
               "args": ["--stdio"],
               "fileWatcher": {
                 "patterns": ["**/*.ext"]
               }
             }
           }
         }
         ```

      3. **Install LSP server**:
         ```bash
         # TypeScript
         npm install -g typescript-language-server

         # Python
         pip install python-lsp-server

         # Rust
         rustup component add rust-analyzer
         ```

      4. **Documentation improvements**:
         ```markdown
         ## LSP Server Setup

         1. Install LSP server: ...
         2. Create .lsp.json
         3. Verify with test file

         Features:
         - Code completion
         - Error checking
         - Navigation
         ```

      **Checklist**:
      - [ ] .lsp.json file exists
      - [ ] LSP server installed
      - [ ] File watching patterns correct
      - [ ] README explains install steps
      - [ ] Provides verification method

