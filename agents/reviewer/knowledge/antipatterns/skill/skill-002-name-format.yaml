id: SKILL-002
name: name-format
severity: error
component_type: skill
category: metadata

title:
  zh: "Skill 名称格式无效"
  en: "Invalid Skill name format"

description:
  zh: |
    Skill 名称必须遵循 kebab-case 命名规范（小写字母，单词间用连字符分隔）。
    名称只能包含小写字母、数字和连字符，不能以连字符开头或结尾。
  en: |
    Skill name must follow kebab-case naming convention (lowercase letters, words separated by hyphens).
    Name can only contain lowercase letters, numbers, and hyphens. Cannot start or end with hyphen.

rationale:
  zh: "统一的命名规范确保组件库的一致性，便于搜索和引用。"
  en: "Consistent naming ensures component library uniformity, making search and reference easier."

handbook_reference: "Chapter 4.2"

detection:
  method: regex
  patterns:
    format: '^name:\s*([A-Z][^\s]*|[^a-z0-9-].*|.*[-_]$|^[^a-z].*)$'  # 格式检查
    length: '^name:\s*.{65,}$'  # 长度检查：>64字符
  rules:
    - "仅小写字母、数字和连字符"
    - "最多64个字符"
    - "不能以连字符开头或结尾"
  file_pattern: '*.md'
  official_reference: "OFF-INT-005, OFF-INT-006"

fix:
  automatic: true
  suggestion:
    zh: "将名称转换为 kebab-case 格式，如：MySkill -> my-skill"
    en: "Convert name to kebab-case format, e.g., MySkill -> my-skill"

examples:
  bad:
    zh: |
      ❌ 错误1：使用大写字母
      ---
      name: MySkill
      ---

      ❌ 错误2：使用下划线
      ---
      name: my_skill
      ---

      ❌ 错误3：超过64字符
      ---
      name: this-is-a-very-long-skill-name-that-exceeds-the-maximum-allowed-length-limit
      ---
      （67字符，超过64字符限制）
    en: |
      ❌ Error 1: Using uppercase
      ---
      name: MySkill
      ---

      ❌ Error 2: Using underscore
      ---
      name: my_skill
      ---

      ❌ Error 3: Exceeds 64 characters
      ---
      name: this-is-a-very-long-skill-name-that-exceeds-the-maximum-allowed-length-limit
      ---
      (67 chars, exceeds 64-char limit)
  good:
    zh: |
      ✅ 正确：符合格式和长度要求
      ---
      name: my-skill
      ---
      ✅ 小写+连字符，未超过64字符
    en: |
      ✅ Correct: Meets format and length requirements
      ---
      name: my-skill
      ---
      ✅ Lowercase+hyphens, within 64 chars
      ---

tags: ["metadata", "name", "format", "skill"]
related_rules: []
