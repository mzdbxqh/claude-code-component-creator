id: SCALE-002
name: batch-processing-mechanism
severity: warning
component_type: skill
category: scalability

title:
  zh: "分批处理机制缺失"
  en: "Batch processing mechanism missing"

description:
  zh: |
    技能如处理多任务或大批量操作，应提供分批处理机制，
    避免单次处理过多内容导致 Token 溢出或超时。
  en: |
    Skills handling multiple tasks or bulk operations should provide batch processing mechanism
    to avoid token overflow or timeout from processing too much content at once.

rationale:
  zh: "基于扩展性最佳实践，大批量操作应分批处理"
  en: "Per scalability best practices, bulk operations should be processed in batches"

detection:
  method: section-check
  required_when: "处理多任务时"
  required_sections:
    - "分批策略"
    - "批次大小"
    - "Batch"
    - "分批"
  file_pattern: '*.md'

fix:
  automatic: false
  suggestion:
    zh: |
      **分批处理实践**:

      ```markdown
      ## 分批处理

      **批次大小**:
      - 默认：每次执行前 3 个任务
      - 理由：避免 Token 溢出，便于审查

      **批次间审查**:
      - 每批次完成后报告进度
      - 用户确认后续批次

      **进度追踪**:
      ```
      执行计划：[=====>____] 50%

      已完成：Task 1-3
      进行中：Task 4
      待执行：Task 5-10
      ```
      ```
    en: |
      **Batch Processing**:

      ```markdown
      ## Batch Processing

      **Batch Size**:
      - Default: First 3 tasks per batch
      - Reason: Avoid token overflow, enable review

      **Between Batch Review**:
      - Report progress after each batch
      - User confirms subsequent batches

      **Progress Tracking**:
      ```
      Execution: [=====>____] 50%

      Completed: Task 1-3
      In Progress: Task 4
      Pending: Task 5-10
      ```
      ```

tags: ["scalability", "batch-processing", "token-management"]
related_rules: ["SCALE-001", "SCALE-003"]
