id: CMD-007
name: output-format-unspecified
severity: info
component_type: command
category: documentation

title:
  zh: "未指定输出格式"
  en: "Output format not specified"

description:
  zh: |
    Command 应该说明其输出格式，让用户知道可以期待什么结果。
    特别是产生文件或结构化数据的命令。
  en: |
    Command should specify its output format so users know what to expect.
    Especially important for commands producing files or structured data.

rationale:
  zh: "明确的输出预期帮助用户更好地使用命令结果。"
  en: "Clear output expectations help users better utilize command results."

handbook_reference: "Chapter 5.4"

detection:
  method: regex
  pattern: "^(?!.*##\\s*(输出|Output|结果|Result)).*$"
  file_pattern: "commands/*.md"

fix:
  automatic: false
  suggestion:
    zh: "添加输出格式说明，描述返回的数据结构和格式。"
    en: "Add output format section describing returned data structure and format."

examples:
  bad:
    zh: |
      ## 功能
      生成部署报告
    en: |
      ## Function
      Generate deployment report
  good:
    zh: |
      ## 输出
      返回 JSON 格式的部署报告：
      ```json
      {
        "status": "success",
        "deployed_at": "2026-02-28T10:00:00Z"
      }
      ```
    en: |
      ## Output
      Returns JSON format deployment report:
      ```json
      {
        "status": "success",
        "deployed_at": "2026-02-28T10:00:00Z"
      }
      ```

tags: ["documentation", "output", "format", "command"]
related_rules: []
