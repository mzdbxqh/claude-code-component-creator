id: CMD-004
name: slash-command-invalid
severity: error
component_type: command
category: metadata

title:
  zh: "无效的斜杠命令格式"
  en: "Invalid slash command format"

description:
  zh: |
    Command 名称必须以小写字母开头，只能包含小写字母、数字和连字符。
    不能包含空格或特殊字符。
  en: |
    Command name must start with lowercase letter, can only contain lowercase letters, numbers, and hyphens.
    Cannot contain spaces or special characters.

rationale:
  zh: "统一的命名规范确保命令系统的一致性。"
  en: "Consistent naming ensures command system uniformity."

handbook_reference: "Chapter 5.2"

detection:
  method: regex
  pattern: "^name:\\s*([A-Z][^\\s]*|[^a-z0-9-].*|.*[-_]$|^[^a-z].*)$"
  file_pattern: "commands/*.md"

fix:
  automatic: true
  suggestion:
    zh: "将名称转换为有效的斜杠命令格式，如：Deploy -> deploy"
    en: "Convert name to valid slash command format, e.g., Deploy -> deploy"

examples:
  bad:
    zh: |
      ---
      name: Deploy App
      ---
    en: |
      ---
      name: Deploy App
      ---
  good:
    zh: |
      ---
      name: deploy-app
      ---
    en: |
      ---
      name: deploy-app
      ---

tags: ["metadata", "name", "format", "command"]
related_rules: []
