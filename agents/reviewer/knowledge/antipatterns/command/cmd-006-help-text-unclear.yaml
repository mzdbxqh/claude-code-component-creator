id: CMD-006
name: help-text-unclear
severity: warning
component_type: command
category: documentation

title:
  zh: "帮助文本不清晰"
  en: "Unclear help text"

description:
  zh: |
    Command 的 description 和帮助文本应该清晰明了，
    让用户快速理解命令用途。
    避免模糊词汇如"处理"、"管理"等。
  en: |
    Command description and help text should be clear and concise,
    letting users quickly understand command purpose.
    Avoid vague words like "handle", "manage", etc.

rationale:
  zh: "清晰的帮助文本减少用户困惑，提高使用效率。"
  en: "Clear help text reduces user confusion and improves efficiency."

handbook_reference: "Chapter 5.4"

detection:
  method: regex
  pattern: "^description:\\s*.*(处理|管理|操作|do something|handle|manage).*"
  file_pattern: "commands/*.md"

fix:
  automatic: false
  suggestion:
    zh: "使用具体的动词和名词描述功能，如：部署应用、生成报告"
    en: "Use specific verbs and nouns: deploy application, generate report"

examples:
  bad:
    zh: |
      description: 处理部署相关的事务
    en: |
      description: Handle deployment related stuff
  good:
    zh: |
      description: 将应用部署到指定环境
    en: |
      description: Deploy application to specified environment

tags: ["documentation", "help", "clarity", "command"]
related_rules: ["CMD-001"]
