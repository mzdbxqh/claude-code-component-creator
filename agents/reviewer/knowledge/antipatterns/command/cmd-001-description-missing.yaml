id: CMD-001
name: description-missing
severity: error
component_type: command
category: metadata

title:
  zh: "缺少描述"
  en: "Missing description"

description:
  zh: |
    Command 必须在 metadata 中包含 description 字段，
    说明命令的用途和功能。
  en: |
    Command must include description field in metadata
    explaining the command's purpose and functionality.

rationale:
  zh: "描述是用户了解命令功能的第一信息源。"
  en: "Description is the primary source for users to understand command functionality."

handbook_reference: "Chapter 5.2"

detection:
  method: regex
  pattern: '^---\n(?!.*description:)'
  file_pattern: 'commands/*.md'

fix:
  automatic: false
  suggestion:
    zh: "添加 description 字段，清晰描述命令用途。"
    en: "Add description field clearly describing command purpose."

examples:
  bad:
    zh: |
      ---
      name: deploy
      ---
    en: |
      ---
      name: deploy
      ---
  good:
    zh: |
      ---
      name: deploy
      description: 部署应用到生产环境
      ---
    en: |
      ---
      name: deploy
      description: Deploy application to production environment
      ---

tags: ["metadata", "description", "command"]
related_rules: []
