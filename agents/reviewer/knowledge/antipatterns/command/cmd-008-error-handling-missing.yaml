id: CMD-008
name: error-handling-missing
severity: error
component_type: command
category: workflow

title:
  zh: "缺少错误处理说明"
  en: "Missing error handling description"

description:
  zh: |
    Command 必须说明可能出现的错误情况及处理方式。
    包括错误码、错误信息和解决方法。
  en: |
    Command must describe possible error scenarios and handling methods.
    Including error codes, messages, and solutions.

rationale:
  zh: "完善的错误处理说明是命令可用性的重要组成部分。"
  en: "Comprehensive error handling is essential for command usability."

handbook_reference: "Chapter 5.4"

detection:
  method: regex
  pattern: "^(?!.*##\\s*(错误处理|Error Handling|错误|Errors)).*$"
  file_pattern: "commands/*.md"

fix:
  automatic: false
  suggestion:
    zh: "添加错误处理章节，列出常见错误码和处理方式。"
    en: "Add error handling section listing common error codes and handling methods."

examples:
  bad:
    zh: |
      # deploy
      部署应用。

      ## 用法
      /deploy app-name
    en: |
      # deploy
      Deploy application.

      ## Usage
      /deploy app-name
  good:
    zh: |
      ## 错误处理

      | 错误码 | 说明 | 解决方法 |
      |--------|------|----------|
      | E001 | 应用不存在 | 检查应用名称是否正确 |
      | E002 | 权限不足 | 联系管理员获取部署权限 |
    en: |
      ## Error Handling

      | Error Code | Description | Solution |
      |------------|-------------|----------|
      | E001 | App not found | Check if app name is correct |
      | E002 | Permission denied | Contact admin for deploy permission |

tags: ["workflow", "error-handling", "command"]
related_rules: []
