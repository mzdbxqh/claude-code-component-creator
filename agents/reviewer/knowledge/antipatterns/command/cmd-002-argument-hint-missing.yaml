id: CMD-002
name: argument-hint-missing
severity: error
component_type: command
category: metadata

title:
  zh: "缺少 argument-hint"
  en: "Missing argument-hint"

description:
  zh: |
    Command 接受参数时必须在 metadata 中声明 argument-hint，
    用于提示用户如何提供参数。
  en: |
    Commands accepting arguments must declare argument-hint in metadata
    to prompt users on how to provide arguments.

rationale:
  zh: "argument-hint 提升用户体验，让用户知道如何传递参数。"
  en: "argument-hint improves UX by letting users know how to pass arguments."

handbook_reference: "Chapter 5.2"

detection:
  method: custom
  custom_function: "check_cmd_missing_argument_hint"
  file_pattern: "commands/*.md"

fix:
  automatic: false
  suggestion:
    zh: "添加 argument-hint 字段，描述参数格式。"
    en: "Add argument-hint field describing parameter format."

examples:
  bad:
    zh: |
      ---
      name: deploy
      description: 部署应用
      ---
    en: |
      ---
      name: deploy
      description: Deploy application
      ---
  good:
    zh: |
      ---
      name: deploy
      description: 部署应用
      argument-hint: "<app-name> [--env production]"
      ---
    en: |
      ---
      name: deploy
      description: Deploy application
      argument-hint: "<app-name> [--env production]"
      ---

tags: ["metadata", "arguments", "command"]
related_rules: []
