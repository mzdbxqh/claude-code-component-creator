id: PY-SEC-001
name: "命令注入检测"
category: python
severity: ERROR
description: |
  检测可能导致命令注入的代码模式:
  - subprocess.call/run/Popen 使用 shell=True
  - os.system/os.popen 使用字符串拼接
  - 用户输入未经验证直接用于命令构建

rationale: |
  当 shell=True 时，字符串会被 shell 解释执行，如果包含用户输入，
  攻击者可以注入任意命令（如 `; rm -rf /`）。

detection:
  type: ast-pattern
  patterns:
    - type: function-call
      module: subprocess
      function: [call, run, Popen, check_output]
      has_kwarg:
        name: shell
        value: True

    - type: function-call
      module: os
      function: [system, popen]
      arg_contains: variable

examples:
  bad:
    - code: |
        import subprocess
        user_input = input()
        subprocess.call("ls " + user_input, shell=True)  # 危险！
      reason: "用户输入可能包含 `; rm -rf /` 等恶意命令"

    - code: |
        os.system(f"ping {host}")  # 危险！
      reason: "host 变量未验证，可能被注入"

  good:
    - code: |
        import subprocess
        subprocess.call(["ls", user_input])  # 安全：参数列表模式
      reason: "参数列表模式不会被 shell 解释"

    - code: |
        subprocess.run(["ping", "-c", "1", host], check=True)  # 安全
      reason: "即使 host 包含特殊字符，也会被当作单个参数"

remediation: |
  使用参数列表模式代替字符串拼接:

  ❌ subprocess.call("ls " + path, shell=True)
  ✅ subprocess.call(["ls", path])

  如果必须使用 shell=True，使用 shlex.quote() 转义:

  ✅ subprocess.call(f"ls {shlex.quote(path)}", shell=True)

references:
  - "OWASP: Command Injection"
  - "CWE-77: Improper Neutralization of Special Elements"
