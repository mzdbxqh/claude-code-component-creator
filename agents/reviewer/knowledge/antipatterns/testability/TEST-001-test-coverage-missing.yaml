fix:
  automatic: false
  suggestion:
    zh: |
      **添加测试覆盖**:

      1. **最简单**: 在 README 添加手动测试步骤
         ```markdown
         ## Testing

         1. Run: `/my-skill test-input`
         2. Expected: [describe output]
         3. Edge cases: [list edge cases]
         ```

      2. **推荐**: 创建测试脚本
         ```bash
         tests/
           test.sh          # 测试脚本
           test-cases/      # 测试数据
             input.txt
             expected.txt
         ```

      3. **最佳**: 自动化测试套件
         ```bash
         tests/
           unit/            # 单元测试
           integration/     # 集成测试
           e2e/             # 端到端测试
         ```

      **最小要求**:
      - [ ] README 有测试说明
      - [ ] 至少 2-3 个测试用例
      - [ ] 包含边界情况
      - [ ] 提供预期结果
    en: |
      **Add test coverage**:

      1. **Simplest**: Add manual test steps to README
         ```markdown
         ## Testing

         1. Run: `/my-skill test-input`
         2. Expected: [describe output]
         3. Edge cases: [list edge cases]
         ```

      2. **Recommended**: Create test scripts
         ```bash
         tests/
           test.sh          # Test script
           test-cases/      # Test data
             input.txt
             expected.txt
         ```

      3. **Best**: Automated test suite
         ```bash
         tests/
           unit/            # Unit tests
           integration/     # Integration tests
           e2e/             # End-to-end tests
         ```

      **Minimum Requirements**:
      - [ ] README has testing instructions
      - [ ] At least 2-3 test cases
      - [ ] Includes edge cases
      - [ ] Provides expected results

