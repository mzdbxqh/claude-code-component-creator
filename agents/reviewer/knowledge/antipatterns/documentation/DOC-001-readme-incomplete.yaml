fix:
  automatic: false
  suggestion:
    zh: |
      **完善 README 文档**:

      **最小模板**:
      ```markdown
      # [组件名称]

      [一句话描述]

      ## Installation
      [详细安装步骤，可复制粘贴]

      ## Usage
      [基本使用示例，包含输入输出]

      ## Configuration
      [配置选项，如果有]

      ## Testing
      [如何测试验证]

      ## Troubleshooting
      [常见问题 1-3 个]
      ```

      **检查清单**:
      - [ ] 标题和简介
      - [ ] 完整安装步骤
      - [ ] 可运行的示例
      - [ ] 预期输出展示
      - [ ] 配置说明（如需要）
      - [ ] 测试方法
      - [ ] 故障排除

      **质量标准**:
      - 所有命令都可直接复制运行
      - 示例使用实际数据
      - 包含截图或输出示例
      - 故障排除覆盖常见错误
    en: |
      **Complete README documentation**:

      **Minimum Template**:
      ```markdown
      # [Component Name]

      [One-sentence description]

      ## Installation
      [Detailed install steps, copy-pasteable]

      ## Usage
      [Basic usage examples with inputs/outputs]

      ## Configuration
      [Config options, if any]

      ## Testing
      [How to test and verify]

      ## Troubleshooting
      [1-3 common issues]
      ```

      **Checklist**:
      - [ ] Title and overview
      - [ ] Complete install steps
      - [ ] Runnable examples
      - [ ] Expected output shown
      - [ ] Configuration explained (if needed)
      - [ ] Testing method
      - [ ] Troubleshooting

      **Quality Standards**:
      - All commands copy-pasteable
      - Examples use real data
      - Include screenshots or output samples
      - Troubleshooting covers common errors

tags: ["documentation", "readme", "quality", "user-experience", "completeness"]
related_rules: ["DOC-002", "TEST-001", "QUA-001"]
