fix:
  automatic: false
  suggestion:
    zh: |
      **完善插件元数据**:

      1. **添加必需字段**：
         ```json
         {
           "name": "my-plugin",
           "version": "1.0.0",
           "description": "详细的功能描述",
           "author": "作者名称"
         }
         ```

      2. **使用语义化版本**：
         - 主版本: 不兼容的 API 变化
         - 次版本: 向后兼容的功能添加
         - 修订版本: 向后兼容的问题修复
         - 预发布: 1.0.0-alpha.1, 1.0.0-beta.2

      3. **添加推荐字段**：
         ```json
         {
           "homepage": "https://github.com/user/plugin",
           "license": "MIT",
           "keywords": ["tool", "automation"],
           "compatibility": {
             "claudeCode": ">=1.0.0"
           }
         }
         ```

      4. **声明依赖**：
         ```json
         {
           "dependencies": {
             "external": ["Node.js >= 16", "jq >= 1.6"],
             "mcp": ["@modelcontextprotocol/server-github"]
           }
         }
         ```

      **元数据检查清单**:
      - [ ] name, version, description, author 完整
      - [ ] 版本号符合 semver 规范
      - [ ] 描述清晰具体（>20字）
      - [ ] 添加 homepage/license/keywords
      - [ ] 声明 compatibility
      - [ ] 列出所有 external dependencies
    en: |
      **Complete plugin metadata**:

      1. **Add required fields**:
         ```json
         {
           "name": "my-plugin",
           "version": "1.0.0",
           "description": "Detailed functionality description",
           "author": "Author name"
         }
         ```

      2. **Use semantic versioning**:
         - Major: Incompatible API changes
         - Minor: Backward-compatible features
         - Patch: Backward-compatible fixes
         - Pre-release: 1.0.0-alpha.1, 1.0.0-beta.2

      3. **Add recommended fields**:
         ```json
         {
           "homepage": "https://github.com/user/plugin",
           "license": "MIT",
           "keywords": ["tool", "automation"],
           "compatibility": {
             "claudeCode": ">=1.0.0"
           }
         }
         ```

      4. **Declare dependencies**:
         ```json
         {
           "dependencies": {
             "external": ["Node.js >= 16", "jq >= 1.6"],
             "mcp": ["@modelcontextprotocol/server-github"]
           }
         }
         ```

      **Metadata Checklist**:
      - [ ] name, version, description, author complete
      - [ ] Version follows semver
      - [ ] Description clear and specific (>20 chars)
      - [ ] Added homepage/license/keywords
      - [ ] Declared compatibility
      - [ ] Listed all external dependencies

