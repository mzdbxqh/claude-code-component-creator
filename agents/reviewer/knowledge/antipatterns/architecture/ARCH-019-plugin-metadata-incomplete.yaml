        "name": "code-analyzer",
        "version": "1.2.0",
        "description": "静态代码分析工具，支持 JavaScript、TypeScript、Python 代码质量检查和安全扫描",
        "author": {
          "name": "张三",
          "email": "zhangsan@example.com"
        },
        "homepage": "https://github.com/zhangsan/code-analyzer",
        "license": "MIT",
        "keywords": ["code", "analyzer", "linter", "security"],
        "compatibility": {
          "claudeCode": ">=1.0.0"
        }
      }

      ✅ 所有必需字段完整
      ✅ 描述清晰具体
      ✅ 作者信息完整
      ✅ 声明兼容性
      ```

      正确2：声明依赖
      ```json
      {
        "name": "git-workflow",
        "version": "2.0.1",
        "description": "Git 工作流自动化工具，提供提交规范检查、分支管理和代码审查集成",
        "author": "李四",
        "homepage": "https://github.com/lisi/git-workflow",
        "license": "Apache-2.0",
        "keywords": ["git", "workflow", "automation"],
        "compatibility": {
          "claudeCode": ">=1.0.0",
          "git": ">=2.30.0"
        },
        "dependencies": {
          "external": [
            "git >= 2.30.0",
            "gh CLI (optional, for PR features)"
          ],
          "mcp": [
            "@modelcontextprotocol/server-github"
