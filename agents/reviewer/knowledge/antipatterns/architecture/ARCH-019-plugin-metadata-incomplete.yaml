id: ARCH-019
name: plugin-metadata-incomplete
severity: warning
component_type: plugin
category: architecture

title:
  zh: "插件元数据不完整"
  en: "Plugin metadata incomplete"

description:
  zh: |
    插件应该包含完整的元数据信息，提升可发现性和用户体验。

    **必需字段**：
    - **name**: 插件唯一标识符
    - **version**: 语义化版本号 (semver)
    - **description**: 插件功能描述
    - **author**: 作者信息

    **推荐字段**：
    - **homepage**: 项目主页或仓库
    - **license**: 许可证类型
    - **keywords**: 搜索关键词
    - **compatibility**: Claude Code 版本兼容性
    - **dependencies**: 外部依赖声明

    **最佳实践**：
    - 使用语义化版本
    - 提供清晰的描述
    - 声明兼容性范围
    - 列出所有依赖

  en: |
    Plugins should include complete metadata for discoverability and user experience.

    **Required Fields**:
    - **name**: Unique plugin identifier
    - **version**: Semantic version (semver)
    - **description**: Plugin functionality description
    - **author**: Author information

    **Recommended Fields**:
    - **homepage**: Project homepage or repository
    - **license**: License type
    - **keywords**: Search keywords
    - **compatibility**: Claude Code version compatibility
    - **dependencies**: External dependency declarations

    **Best Practices**:
    - Use semantic versioning
    - Provide clear description
    - Declare compatibility range
    - List all dependencies

rationale:
  zh: "基于官方建议 (plugin-system.md OFF-CFG-008~010)，完整元数据提升插件可维护性和用户信任"
  en: "Per official recommendations (plugin-system.md OFF-CFG-008~010), complete metadata improves plugin maintainability and user trust"

detection:
  method: config-check
  indicators:
    - missing_required: "缺少必需字段"
    - vague_description: "描述过于简短或模糊"
    - no_version: "未指定版本号"
    - no_compatibility: "未声明兼容性"

official_reference:
  document: "markdown_docs/plugin-system.md"
  section: "插件元数据"
  lines: "89-142"
  quote: "plugin.json 必须包含 name、version、description。推荐 author、homepage、license。"

examples:
  bad:
    zh: |
      错误1：缺少必需字段
      ```json
      {
        "name": "my-plugin"
      }

      ❌ 缺少 version
      ❌ 缺少 description
      ❌ 用户不知道插件功能
      ```

      错误2：版本号不规范
      ```json
      {
        "name": "code-analyzer",
        "version": "latest",
        "description": "Analyze code"
      }

      ❌ "latest" 不是语义化版本
      应该使用: "1.0.0", "0.2.1" 等
      ```

      错误3：描述过于简短
      ```json
      {
        "name": "git-tools",
        "version": "1.0.0",
        "description": "Git"
      }

      ❌ 描述太简短
      用户无法了解具体功能
      ```

      错误4：未声明依赖
      ```json
      {
        "name": "data-processor",
        "version": "1.0.0",
        "description": "Process data files"
      }

      实际依赖:
      - Node.js >= 16
      - jq 命令行工具
      - Python 3.8+

      ❌ 未在 metadata 中声明
      用户无法预知环境要求
      ```
    en: |
      Error 1: Missing required fields
      ```json
      {
        "name": "my-plugin"
      }

      ❌ Missing version
      ❌ Missing description
      ❌ User doesn't know plugin functionality
      ```

      Error 2: Non-standard version
      ```json
      {
        "name": "code-analyzer",
        "version": "latest",
        "description": "Analyze code"
      }

      ❌ "latest" is not semantic version
      Should use: "1.0.0", "0.2.1", etc.
      ```

      Error 3: Too brief description
      ```json
      {
        "name": "git-tools",
        "version": "1.0.0",
        "description": "Git"
      }

      ❌ Description too brief
      User cannot understand specific features
      ```

      Error 4: Undeclared dependencies
      ```json
      {
        "name": "data-processor",
        "version": "1.0.0",
        "description": "Process data files"
      }

      Actual dependencies:
      - Node.js >= 16
      - jq CLI tool
      - Python 3.8+

      ❌ Not declared in metadata
      User cannot anticipate environment requirements
      ```

  good:
    zh: |
      正确1：完整的元数据
