id: ARCH-010
name: model-task-mismatch
severity: info
component_type: all
category: configuration

title:
  zh: "模型选择建议"
  en: "Model selection recommendation"

description:
  zh: |
    模型选择建议根据任务复杂度，但 inherit 是推荐默认值。

    **官方模型选项**（OFF-LLM-001~002）：
    - **inherit**: 继承主对话模型（推荐默认）
    - **haiku**: 快速、简单任务
    - **sonnet**: 中等复杂度任务
    - **opus**: 复杂推理、设计任务

    **推荐策略**：
    1. 默认使用 inherit（自动适配）
    2. 有特定性能需求时选择具体模型
    3. 在文档中说明选择原因

    注意：这是建议而非强制要求，inherit 是有效且推荐的选项。
  en: |
    Model selection suggestions based on task complexity, but inherit is recommended default.

    **Official Model Options** (OFF-LLM-001~002):
    - **inherit**: Inherit main conversation model (recommended default)
    - **haiku**: Fast, simple tasks
    - **sonnet**: Medium complexity tasks
    - **opus**: Complex reasoning, design tasks

    **Recommended Strategy**:
    1. Default to inherit (auto-adapts)
    2. Choose specific model for specific performance needs
    3. Document reasoning in docs

    Note: This is a suggestion, not a requirement; inherit is valid and recommended.

rationale:
  zh: "基于官方标准 (sub-agents.md OFF-LLM-001~002)，inherit是推荐默认值，具体模型选择取决于特定需求"
  en: "Per official standards (sub-agents.md OFF-LLM-001~002), inherit is recommended default; specific model choice depends on specific needs"

official_reference:
  document: "markdown_docs/sub-agents.md"
  section: "Model Configuration"
  checkpoints: ["OFF-LLM-001", "OFF-LLM-002"]
  quote: "model 字段支持 sonnet/opus/haiku/inherit。inherit 使用主对话模型。"

detection:
  method: recommendation-check
  recommendations:
    - task_type: "complex-reasoning"
      suggested_models: ["inherit", "opus", "sonnet"]
      keywords: ["architecture", "design", "review", "refactor"]
    - task_type: "simple-operations"
      suggested_models: ["inherit", "haiku", "sonnet"]
      keywords: ["format", "convert", "list", "count"]
    - task_type: "default"
      suggested_models: ["inherit"]
      note: "inherit 适用于大多数场景"

fix:
  automatic: false
  suggestion:
    zh: |
      调整模型选择：
      1. 架构/设计/规划任务 → sonnet或opus
      2. 代码执行/数据处理 → sonnet
      3. 简单格式化/提取 → haiku
      4. 在SKILL.md中说明模型选择理由
    en: |
      Adjust model selection:
      1. Architecture/design/planning → sonnet or opus
      2. Code execution/data processing → sonnet
      3. Simple formatting/extraction → haiku
      4. Document model selection rationale in SKILL.md

examples:
  bad:
    zh: |
      # 架构设计任务使用轻量模型
      ---
      name: architecture-designer
      model: haiku  # 不合适：架构设计需要推理能力
      ---
    en: |
      # Architecture task using lightweight model
      ---
      name: architecture-designer
      model: haiku  # Unsuitable: architecture needs reasoning
      ---
  good:
    zh: |
      # 根据任务复杂度选择模型
      ---
      name: architecture-designer
      model: opus   # 架构设计使用最强模型
      ---

      ---
      name: json-formatter
      model: haiku  # 简单任务使用轻量模型
      ---
    en: |
      # Select model based on task complexity
      ---
      name: architecture-designer
      model: opus   # Architecture uses strongest model
      ---

      ---
      name: json-formatter
      model: haiku  # Simple task uses lightweight model
      ---

tags: ["architecture", "model", "efficiency", "cost"]
