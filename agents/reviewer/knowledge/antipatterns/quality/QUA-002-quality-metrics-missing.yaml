fix:
  automatic: false
  suggestion:
    zh: |
      **添加质量指标**:

      1. **README 徽章**：
         ```markdown
         ![Version](https://img.shields.io/badge/version-v1.0.0-blue)
         ![Status](https://img.shields.io/badge/status-beta-yellow)
         ![Tests](https://img.shields.io/badge/tests-passing-success)
         ```

      2. **plugin.json 元数据**：
         ```json
         {
           "version": "1.0.0",
           "metadata": {
             "maturity": "beta",
             "testCoverage": 75
           }
         }
         ```

      3. **创建 CHANGELOG**：
         ```markdown
         # Changelog

         ## [1.0.0] - 2026-03-11
         - Initial release
         ```

      **最小指标集**:
      - [ ] 版本号
      - [ ] 成熟度（alpha/beta/stable）
      - [ ] 测试状态
      - [ ] CHANGELOG
    en: |
      **Add quality metrics**:

      1. **README badges**:
         ```markdown
         ![Version](https://img.shields.io/badge/version-v1.0.0-blue)
         ![Status](https://img.shields.io/badge/status-beta-yellow)
         ![Tests](https://img.shields.io/badge/tests-passing-success)
         ```

      2. **plugin.json metadata**:
         ```json
         {
           "version": "1.0.0",
           "metadata": {
             "maturity": "beta",
             "testCoverage": 75
           }
         }
         ```

      3. **Create CHANGELOG**:
         ```markdown
         # Changelog

         ## [1.0.0] - 2026-03-11
         - Initial release
         ```

      **Minimum metrics set**:
      - [ ] Version number
      - [ ] Maturity (alpha/beta/stable)
      - [ ] Test status
      - [ ] CHANGELOG

