id: PERSIST-003
name: non-atomic-file-writes
severity: warning
component_type: all
category: persistence

title:
  zh: "非原子文件写入"
  en: "Non-atomic file writes"

description:
  zh: |
    直接写入文件而不使用临时文件和重命名模式，在写入过程中发生中断时
    可能导致文件损坏或数据丢失。应使用原子写入模式确保数据完整性。
  en: |
    Writing directly to files without using temp file and rename pattern may cause
    file corruption or data loss if interruption occurs during write.
    Atomic write pattern should be used to ensure data integrity.

rationale:
  zh: "基于数据完整性最佳实践，文件写入必须是原子的"
  en: "Per data integrity best practices, file writes must be atomic"

detection:
  method: code-analysis
  patterns:
    - pattern: 'open\s*\(\s*[^,]+\s*,\s*["\x27]w["\x27]\s*\)'
      description: "Direct file write without atomic pattern"
    - pattern: 'with\s+open\s*\(\s*[^,]+\s*,\s*["\x27]w["\x27]\s*\)'
      description: "Direct context manager file write"
  safe_patterns:
    - pattern: 'tempfile'
      description: "Using tempfile module"
    - pattern: 'os\.rename'
      description: "Using atomic rename"
    - pattern: 'shutil\.move'
      description: "Using shutil move"
  file_pattern: '*.py'

fix:
  automatic: false
  suggestion:
    zh: |
      **原子文件写入实践**:

      ❌ 不安全:
      ```python
      # 直接写入，中断时可能损坏文件
      with open("data.json", "w") as f:
          json.dump(data, f)
      ```

      ✅ 安全:
      ```python
      import os
      import tempfile
      import json
      from pathlib import Path

      def atomic_write(filepath, data):
          """原子写入文件"""
          filepath = Path(filepath)
          temp_path = filepath.with_suffix('.tmp')

          # 写入临时文件
          with open(temp_path, "w") as f:
              json.dump(data, f)
              f.flush()
              os.fsync(f.fileno())

          # 原子重命名
          os.replace(temp_path, filepath)

      # 或使用标准库
      import tempfile
      import shutil

      def atomic_write_stdlib(filepath, data):
          """使用标准库实现原子写入"""
          dir_name = os.path.dirname(filepath) or "."
          fd, temp_path = tempfile.mkstemp(dir=dir_name)
          try:
              with os.fdopen(fd, "w") as f:
                  json.dump(data, f)
              shutil.move(temp_path, filepath)
          except:
              os.unlink(temp_path)
              raise
      ```
    en: |
      **Atomic File Write Practice**:

      ❌ Unsafe:
      ```python
      # Direct write, file may be corrupted on interruption
      with open("data.json", "w") as f:
          json.dump(data, f)
      ```

      ✅ Safe:
      ```python
      import os
      import tempfile
      import json
      from pathlib import Path

      def atomic_write(filepath, data):
          """Atomic file write"""
          filepath = Path(filepath)
          temp_path = filepath.with_suffix('.tmp')

          # Write to temp file
          with open(temp_path, "w") as f:
              json.dump(data, f)
              f.flush()
              os.fsync(f.fileno())

          # Atomic rename
          os.replace(temp_path, filepath)

      # Or use standard library
      import tempfile
      import shutil

      def atomic_write_stdlib(filepath, data):
          """Atomic write using standard library"""
          dir_name = os.path.dirname(filepath) or "."
          fd, temp_path = tempfile.mkstemp(dir=dir_name)
          try:
              with os.fdopen(fd, "w") as f:
                  json.dump(data, f)
              shutil.move(temp_path, filepath)
          except:
              os.unlink(temp_path)
              raise
      ```

tags: ["persistence", "atomic-write", "data-integrity", "file-io"]
related_rules: ["PERSIST-001", "PERSIST-002"]
