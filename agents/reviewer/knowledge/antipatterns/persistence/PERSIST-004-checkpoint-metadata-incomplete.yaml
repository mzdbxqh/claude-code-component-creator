          "step_2_analysis": "docs/review-aggregator-20260316-143022/step-2-architecture-analysis.json",
          "step_3_review": "docs/review-aggregator-20260316-143022/step-3-review-core.json",
          "step_4_report": "docs/review-aggregator-20260316-143022/step-4-generate-report.json"
        },
