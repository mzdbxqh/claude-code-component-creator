    en: |
      ✅ Correct 1: Minimally complete checkpoint.json

      ```json
      {
        "transaction_id": "review-20260316-143022",
        "workflow_type": "review-aggregator",
        "status": "pending",
        "current_step": 0,
        "data_directory": "docs/review-aggregator-20260316-143022",
        "key_files": {}
      }
      ```

      ✅ Correct 2: checkpoint.json in mid-execution

