            "languages": ["rust"]
          }
        }
      }
      ```

      ✅ Good 3: Complete plugin config structure
      ```
      my-plugin/
        .claude-plugin/
          plugin.json        ← Plugin metadata
        .lsp.json            ← ✅ LSP server config
        .mcp.json            ← MCP server config
        settings.json        ← Agent defaults
        hooks/
          hooks.json         ← Hooks config
        skills/
          skill-1/
      ```

      .lsp.json:
      ```json
      {
        "lspServers": {
          "go": {
            "command": "gopls",
            "args": ["-mode=stdio"],
            "languages": ["go"]
          }
        }
      }
      ```

      ✅ Good 4: Empty LSP config (not using LSP)
      ```json
      // .lsp.json (optional)
      {
        "lspServers": {}
      }
      ```
      or completely omit .lsp.json file

