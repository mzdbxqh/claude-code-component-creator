fix:
  automatic: true
  suggestion:
    zh: |
      **自动修复**:

      1. 检查 LSP 配置位置

      2. 如果在 settings.json：
         - 提取 lspServers
         - 创建 .lsp.json
         - 从 settings.json 移除该键

      3. 如果文件名是 lsp.json：
         - 重命名为 .lsp.json

      4. 如果在 .mcp.json 中：
         - 提取 lspServers
         - 创建 .lsp.json
         - 从 .mcp.json 移除该键

      **迁移脚本**:

      ```bash
      # 从 settings.json 提取 LSP 配置
      if [ -f settings.json ]; then
        jq '{lspServers: .lspServers}' settings.json > .lsp.json

        # 清理 settings.json
        jq 'del(.lspServers)' settings.json > settings.json.tmp
        mv settings.json.tmp settings.json
      fi

      # 从 .mcp.json 提取 LSP 配置
      if [ -f .mcp.json ]; then
        if jq 'has("lspServers")' .mcp.json | grep -q true; then
          jq '{lspServers: .lspServers}' .mcp.json > .lsp.json

          # 清理 .mcp.json
          jq 'del(.lspServers)' .mcp.json > .mcp.json.tmp
          mv .mcp.json.tmp .mcp.json
        fi
      fi

      # 重命名 lsp.json 为 .lsp.json
      if [ -f lsp.json ]; then
        mv lsp.json .lsp.json
      fi
      ```

      **验证**:

      ```bash
      # 验证 .lsp.json 存在且格式正确
      test -f .lsp.json && jq '.lspServers' .lsp.json

      # 验证其他文件不包含 lspServers
      ! jq 'has("lspServers")' settings.json 2>/dev/null
      ! jq 'has("lspServers")' .mcp.json 2>/dev/null
      ```

      **文档建议**:

      在 README 中添加 LSP 安装说明：
      ```markdown
      ## LSP Setup

      1. Install language servers
      2. Configure in .lsp.json
      3. Verify: `claude --plugin-dir . --version`
      ```
    en: |
      **Automatic Fix**:

      1. Check LSP config location

      2. If in settings.json:
         - Extract lspServers
         - Create .lsp.json
         - Remove key from settings.json

      3. If filename is lsp.json:
         - Rename to .lsp.json

      4. If in .mcp.json:
         - Extract lspServers
         - Create .lsp.json
         - Remove key from .mcp.json

      **Migration Script**:

      ```bash
      # Extract LSP config from settings.json
      if [ -f settings.json ]; then
        jq '{lspServers: .lspServers}' settings.json > .lsp.json

        # Clean settings.json
        jq 'del(.lspServers)' settings.json > settings.json.tmp
        mv settings.json.tmp settings.json
      fi

      # Extract LSP config from .mcp.json
      if [ -f .mcp.json ]; then
        if jq 'has("lspServers")' .mcp.json | grep -q true; then
          jq '{lspServers: .lspServers}' .mcp.json > .lsp.json

          # Clean .mcp.json
          jq 'del(.lspServers)' .mcp.json > .mcp.json.tmp
          mv .mcp.json.tmp .mcp.json
        fi
      fi

      # Rename lsp.json to .lsp.json
      if [ -f lsp.json ]; then
        mv lsp.json .lsp.json
      fi
      ```

      **Validation**:

      ```bash
      # Verify .lsp.json exists and is valid
      test -f .lsp.json && jq '.lspServers' .lsp.json

      # Verify other files don't contain lspServers
      ! jq 'has("lspServers")' settings.json 2>/dev/null
      ! jq 'has("lspServers")' .mcp.json 2>/dev/null
      ```

      **Documentation Recommendation**:

      Add LSP installation instructions in README:
      ```markdown
      ## LSP Setup

      1. Install language servers
      2. Configure in .lsp.json
      3. Verify: `claude --plugin-dir . --version`
      ```

